<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Khaoula 👰🏻‍♀️</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --blush:  #f7d6d0;
      --rose:   #c9727a;
      --deep:   #7a2d35;
      --gold:   #c9a96e;
      --cream:  #fdf6f0;
      --text:   #3a1a1e;
      --glass:  rgba(255,255,255,0.55);
    }

    html { height: 100%; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--cream);
      font-family: 'Jost', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
      padding: 24px 16px 40px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 20% 10%,  #f9e0da 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 80%,  #f5cfc8 0%, transparent 60%),
        radial-gradient(ellipse 80% 60% at 50% 50%,  #fdf6f0 0%, transparent 80%);
      z-index: 0;
    }

    /* ── Petals ── */
    #petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .petal {
      position: absolute;
      top: -50px;
      opacity: 0;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0%   { transform: translateY(0)     rotate(0deg)   scale(1);   opacity: 0; }
      6%   { opacity: 0.7; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(110vh) rotate(360deg) scale(0.6); opacity: 0; }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 32px;
      padding: clamp(28px, 8vw, 44px) clamp(20px, 6vw, 36px) clamp(32px, 9vw, 48px);
      text-align: center;
      box-shadow:
        0 8px 40px rgba(122,45,53,0.09),
        0 2px 8px  rgba(201,114,122,0.08),
        inset 0 1px 0 rgba(255,255,255,0.9);
      animation: rise 1.1s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes rise {
      from { opacity:0; transform: translateY(40px) scale(0.96); }
      to   { opacity:1; transform: translateY(0)    scale(1);    }
    }

    /* ── Ring icon ── */
    .ring-wrap { display:flex; justify-content:center; margin-bottom: 18px; }
    .ring {
      width: 62px; height: 62px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.9rem;
      background: rgba(255,255,255,0.65);
      box-shadow: 0 0 0 7px rgba(201,169,110,0.13);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 7px rgba(201,169,110,0.13); }
      50%      { box-shadow: 0 0 0 16px rgba(201,169,110,0.05); }
    }

    /* ── Text ── */
    .eyebrow {
      font-weight: 300;
      font-size: clamp(0.6rem, 2.4vw, 0.72rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 8px;
      opacity: 0; animation: fadein 0.8s 0.4s forwards;
    }
    .name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-style: italic;
      font-size: clamp(2.8rem, 14vw, 4rem);
      line-height: 1;
      color: var(--deep);
      margin-bottom: 6px;
      opacity: 0; animation: fadein 0.9s 0.55s forwards;
    }
    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(0.85rem, 3.8vw, 1.05rem);
      color: var(--rose);
      line-height: 1.6;
      margin-bottom: 26px;
      opacity: 0; animation: fadein 0.9s 0.7s forwards;
    }
    @keyframes fadein {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 24px;
      opacity: 0; animation: fadein 0.8s 0.85s forwards;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }
    .divider span { font-size: 0.75rem; color: var(--gold); }

    /* ── Countdown ── */
    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(6px, 2vw, 10px);
      margin-bottom: 24px;
      opacity: 0; animation: fadein 0.9s 1s forwards;
    }
    .unit { display:flex; flex-direction:column; align-items:center; gap:5px; }
    .box {
      width: 100%;
      aspect-ratio: 1;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(201,169,110,0.28);
      border-radius: clamp(12px, 4vw, 18px);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: clamp(1.5rem, 8vw, 2.4rem);
      color: var(--deep);
      box-shadow:
        0 4px 14px rgba(122,45,53,0.07),
        inset 0 1px 0 rgba(255,255,255,0.95);
      position: relative; overflow: hidden;
    }
    .box::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(150deg, rgba(255,255,255,0.45) 0%, transparent 55%);
      pointer-events: none;
    }
    .box.tick { animation: tickanim 0.28s cubic-bezier(.36,.07,.19,.97); }
    @keyframes tickanim {
      0%  { transform: scale(1); }
      30% { transform: scale(0.92); }
      70% { transform: scale(1.05); }
      100%{ transform: scale(1); }
    }
    .label {
      font-weight: 300;
      font-size: clamp(0.52rem, 2vw, 0.63rem);
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--rose);
    }

    /* ── Progress ── */
    .progress-wrap {
      margin-bottom: 24px;
      opacity: 0; animation: fadein 0.8s 1.15s forwards;
    }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: clamp(0.55rem, 2vw, 0.65rem);
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 7px;
    }
    .progress-track {
      height: 4px;
      background: rgba(201,169,110,0.15);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blush), var(--rose), var(--gold));
      border-radius: 99px;
      transition: width 1s ease;
    }

    /* ── Date pill ── */
    .date-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(201,114,122,0.09);
      border: 1px solid rgba(201,114,122,0.22);
      border-radius: 99px;
      padding: 8px 20px;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.9rem, 4vw, 1.1rem);
      font-style: italic;
      color: var(--deep);
      margin-bottom: 22px;
      opacity: 0; animation: fadein 0.8s 1.3s forwards;
    }

    /* ── Footer ── */
    .footer-msg {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(0.88rem, 3.6vw, 1.05rem);
      color: rgba(122,45,53,0.58);
      line-height: 1.75;
      opacity: 0; animation: fadein 0.8s 1.5s forwards;
    }

    /* ── Hearts ── */
    .hearts {
      display: flex; justify-content: center; gap: 8px;
      margin-top: 20px;
      opacity: 0; animation: fadein 0.8s 1.7s forwards;
    }
    .hearts span { animation: hb 2s ease-in-out infinite; font-size: 0.8rem; }
    .hearts span:nth-child(2) { animation-delay:0.35s; font-size: 1.1rem; }
    .hearts span:nth-child(3) { animation-delay:0.7s; }
    @keyframes hb {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.35); }
    }
  </style>
</head>
<body>

<div id="petals"></div>

<div class="card">
  <div class="ring-wrap"><div class="ring">💍</div></div>

  <p class="eyebrow">Future mariée en cours de chargement… patience</p>
  <h1 class="name">Khaoula</h1>
  <p class="subtitle">👰🏻‍♀️<br>le grand jour approche doucement</p>

  <div class="divider"><span>✦</span></div>

  <div class="countdown">
    <div class="unit"><div class="box" id="d">000</div><div class="label">jours</div></div>
    <div class="unit"><div class="box" id="h">00</div><div class="label">heures</div></div>
    <div class="unit"><div class="box" id="m">00</div><div class="label">min</div></div>
    <div class="unit"><div class="box" id="s">00</div><div class="label">sec</div></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>aujourd'hui</span>
      <span id="pct">0%</span>
      <span>22 août 2026</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="bar" style="width:0%"></div>
    </div>
  </div>

  <div class="date-pill"><span>🌸</span> 22 août 2026 <span>🌸</span></div>

  <p class="footer-msg">Chaque seconde qui passe<br>nous rapproche du plus beau jour…</p>

  <div class="hearts">
    <span>🌷</span><span>🤍</span><span>🌷</span>
  </div>
</div>

<script>
  // Petals
  const PETALS = ['🌸','🌷','✿','🪷','💮'];
  const canvas = document.getElementById('petals');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = PETALS[i % PETALS.length];
    p.style.left             = Math.random() * 100 + 'vw';
    p.style.fontSize         = (0.65 + Math.random() * 0.75) + 'rem';
    p.style.animationDuration  = (7 + Math.random() * 9) + 's';
    p.style.animationDelay     = (Math.random() * 14) + 's';
    canvas.appendChild(p);
  }

  // Countdown
  const TARGET = new Date('2026-08-22T00:00:00');
  const START  = new Date('2026-01-01T00:00:00');

  const dEl = document.getElementById('d');
  const hEl = document.getElementById('h');
  const mEl = document.getElementById('m');
  const sEl = document.getElementById('s');
  const bar = document.getElementById('bar');
  const pct = document.getElementById('pct');
  let prev = {d:'',h:'',m:'',s:''};

  function pad(n, len=2) { return String(n).padStart(len,'0'); }

  function tick(el, val, key) {
    if (val !== prev[key]) {
      el.textContent = val;
      el.classList.remove('tick');
      void el.offsetWidth;
      el.classList.add('tick');
      prev[key] = val;
    }
  }

  function update() {
    const now  = new Date();
    const diff = TARGET - now;
    if (diff <= 0) {
      ['000','00','00','00'].forEach((v,i) => [dEl,hEl,mEl,sEl][i].textContent = v);
      bar.style.width = '100%'; pct.textContent = '100%'; return;
    }
    const days  = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins  = Math.floor((diff % 3600000)  / 60000);
    const secs  = Math.floor((diff % 60000)    / 1000);
    tick(dEl, pad(days,3), 'd');
    tick(hEl, pad(hours),  'h');
    tick(mEl, pad(mins),   'm');
    tick(sEl, pad(secs),   's');
    const p = Math.max(0, Math.min(100, ((now - START) / (TARGET - START)) * 100));
    bar.style.width   = p.toFixed(2) + '%';
    pct.textContent   = p.toFixed(1) + '%';
  }

  update();
  setInterval(update, 1000);
</script>
</body>
</html>
